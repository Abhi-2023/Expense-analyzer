services:
  - type: web
    name: expense-analyzer
    runtime: docker
    plan: free
    envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: expense-db
        property: connectionString
    - key: SECRET_KEY
      generateValue: true
    - key: ALGORITHM
      value: HS256
    - key: ACCESS_TOKEN_EXPIRE_MINUTES
      value: "60"
    - key: UPLOAD_DIR
      value: uploads
    - key: PORT
      value: "8000"

databases:
  - name: expense-db
    plan: free
    databaseName: expense_db
    user: expense_user