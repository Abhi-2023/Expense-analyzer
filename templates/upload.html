{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7">

        <div style="text-align: center; margin-bottom: 40px;">
            <h4 style="font-weight: 700; margin-bottom: 8px;">Upload your transactions</h4>
            <p style="color: #888;">We'll categorise every transaction instantly using ML</p>
        </div>

        <div id="error-msg" class="alert alert-danger d-none"></div>
        <div id="success-msg" class="alert alert-success d-none"></div>

        <div class="card p-4 mb-4">
            <div id="drop-zone" style="border: 2px dashed #ddd; border-radius: 12px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s;" onclick="document.getElementById('file-input').click()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                <div style="font-size: 40px; margin-bottom: 16px;">📁</div>
                <p style="font-weight: 500; margin-bottom: 4px;">Drag and drop your file here</p>
                <p style="color: #888; font-size: 14px; margin-bottom: 16px;">or click to browse</p>
                <span style="background: #f5f5f5; border: 1px solid #ddd; padding: 4px 16px; border-radius: 20px; font-size: 13px; color: #666;">CSV &nbsp;·&nbsp; Excel &nbsp;·&nbsp; PDF</span>
            </div>
            <input type="file" id="file-input" class="d-none" accept=".csv,.xlsx,.pdf" onchange="handleFileSelect(event)">

            <div id="file-info" class="d-none mt-3 p-3" style="background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 24px;">📄</span>
                <div style="flex: 1;">
                    <div id="file-name" style="font-weight: 500; font-size: 14px;"></div>
                    <div id="file-size" style="font-size: 12px; color: #888;"></div>
                </div>
                <button onclick="clearFile()" style="background: none; border: none; color: #888; cursor: pointer; font-size: 18px;">×</button>
            </div>

            <button id="upload-btn" onclick="uploadFile()" class="btn btn-dark w-100 mt-3" disabled>
                Upload file
            </button>
        </div>

        <div id="preview-section" class="d-none">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h6 class="mb-0">Preview</h6>
                <span id="row-count" style="background: #e8f4e8; color: #2d7a2d; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 12px;"></span>
            </div>
            <div class="table-responsive mb-4" style="border-radius: 8px; overflow: hidden; border: 1px solid #eee;">
                <table class="table table-sm mb-0">
                    <thead style="background: #f8f9fa;">
                        <tr>
                            <th style="font-weight: 600; font-size: 13px;">Description</th>
                            <th style="font-weight: 600; font-size: 13px;">Amount</th>
                            <th style="font-weight: 600; font-size: 13px;">Account</th>
                        </tr>
                    </thead>
                    <tbody id="preview-table-body"></tbody>
                </table>
            </div>
            <button id="analyse-btn" onclick="runAnalysis()" class="btn btn-success w-100 py-3" style="font-size: 16px; font-weight: 600;">
                Run analysis
            </button>
        </div>

    </div>
</div>

<script src="/static/js/upload.js"></script>
{% endblock %}
