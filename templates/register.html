{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="mb-3">Create an account</h4>

            <div id="error-msg" class="alert alert-danger d-none"></div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Min 6 characters">
            </div>
            <button onclick="register()" class="btn btn-dark w-100">Register</button>
            <p class="text-center text-muted mt-3 mb-0">
                Already have an account? <a href="/login">Login</a>
            </p>
        </div>
    </div>
</div>

<script>
async function register() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-msg');

    const response = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
    });

    const data = await response.json();

    if (response.ok) {
        window.location.href = '/login';
    } else {
        errorDiv.textContent = data.detail || 'Registration failed';
        errorDiv.classList.remove('d-none');
    }
}
</script>
{% endblock %}
