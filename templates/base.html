<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">Expense Categorizer</a>
    <div class="ms-auto">
        {% if user %}
            <a href="/upload" class="btn btn-outline-light btn-sm me-2">Upload</a>
            <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/api/logout" class="btn btn-light btn-sm">Logout</a>
        {% else %}
            <a href="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
            <a href="/register" class="btn btn-light btn-sm">Register</a>
        {% endif %}
    </div>
</nav>

    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center text-muted py-4 mt-5 border-top">
        <small>Expense Categorizer &copy; 2025</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
